<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Cranbrook Rowing — S&amp;C Hub</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Cranbrook palette */
      --navy:    #07122b;
      --navy2:   #0c1f48;
      --navy3:   #102460;
      --blue:    #1a56db;
      --blue2:   #3b82f6;
      --blue3:   #60a5fa;
      /* UI */
      --bg:      #f0f4fb;
      --card:    #ffffff;
      --text:    #07122b;
      --muted:   #5a6a8a;
      --border:  #d0daf0;
      /* Status */
      --green:   #22c55e;
      --amber:   #f59e0b;
      --red:     #e63946;
      /* Medals */
      --gold:    #f59e0b;
      --silver:  #94a3b8;
      --bronze:  #b45309;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ══════════════════════════════════════════
       HEADER
    ══════════════════════════════════════════ */
    .app-header {
      background: var(--navy);
      color: white;
      position: sticky;
      top: 0;
      z-index: 300;
      box-shadow: 0 2px 20px rgba(0,0,0,0.4);
    }

    .app-row1 {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 60px;
    }

    .app-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .app-logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--blue), var(--blue2));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .app-brand-title {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -0.3px;
      color: white;
    }

    .app-brand-sub {
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.5px;
    }

    .app-nav {
      display: flex;
      gap: 4px;
    }

    .app-nav-btn {
      padding: 8px 16px;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.5);
      border-radius: 9px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.18s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .app-nav-btn:hover {
      background: rgba(255,255,255,0.1);
      color: white;
    }

    .app-nav-btn.active {
      background: var(--blue2);
      color: white;
    }

    /* Sub-bars */
    .app-subbar {
      display: none;
      align-items: center;
      justify-content: space-between;
      padding: 10px 24px;
      background: var(--navy2);
      border-top: 1px solid rgba(255,255,255,0.08);
      gap: 12px;
    }

    .app-subbar.on { display: flex; }

    .view-toggle {
      display: flex;
      background: rgba(255,255,255,0.08);
      border-radius: 9px;
      padding: 3px;
      gap: 2px;
    }

    .view-toggle-btn {
      padding: 6px 16px;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.5);
      border-radius: 7px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      transition: all 0.2s;
    }

    .view-toggle-btn.active {
      background: var(--blue2);
      color: white;
    }

    .ath-bar {
      display: none;
      align-items: center;
      gap: 10px;
    }

    .ath-bar.on { display: flex; }

    .ath-bar label {
      color: rgba(255,255,255,0.45);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    #athleteSelect {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      color: white;
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      outline: none;
    }

    #athleteSelect option { background: var(--navy2); }

    .sync-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }

    .sync-info {
      color: rgba(255,255,255,0.45);
      font-size: 12px;
    }

    .sync-btn {
      padding: 7px 16px;
      background: var(--blue2);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: opacity 0.2s;
    }

    .sync-btn:hover { opacity: 0.85; }
    .sync-btn:disabled { background: var(--muted); cursor: not-allowed; }

    /* ══════════════════════════════════════════
       PAGES
    ══════════════════════════════════════════ */
    .page { display: none; }
    .page.active { display: block; }

    /* ══════════════════════════════════════════
       LAYOUT UTILITIES
    ══════════════════════════════════════════ */
    .main { padding: 24px; max-width: 1400px; margin: 0 auto; }

    .section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--muted);
      margin-bottom: 12px;
      margin-top: 28px;
    }

    .section-title:first-child { margin-top: 0; }

    .two-col   { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

    /* ══════════════════════════════════════════
       STAT CARDS
    ══════════════════════════════════════════ */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(155px, 1fr));
      gap: 12px;
    }

    .stat-card {
      background: white;
      border-radius: 12px;
      padding: 16px 18px;
      box-shadow: 0 1px 4px rgba(7,18,43,0.07);
      border-left: 4px solid var(--blue2);
    }

    .stat-card.c-green  { border-left-color: var(--green); }
    .stat-card.c-amber  { border-left-color: var(--amber); }
    .stat-card.c-red    { border-left-color: var(--red); }
    .stat-card.c-navy   { border-left-color: var(--navy); }

    .stat-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 800;
      color: var(--navy);
      line-height: 1;
    }

    .stat-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ══════════════════════════════════════════
       CARDS
    ══════════════════════════════════════════ */
    .card {
      background: white;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 1px 4px rgba(7,18,43,0.07);
    }

    .card-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 16px;
    }

    /* ══════════════════════════════════════════
       TABLES
    ══════════════════════════════════════════ */
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      text-align: left;
      padding: 8px 12px;
      border-bottom: 2px solid var(--border);
      background: #f8fafd;
    }
    .data-table td {
      padding: 10px 12px;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: #f5f8ff; cursor: pointer; }
    .athlete-name { font-weight: 700; color: var(--navy); font-size: 14px; }

    /* ══════════════════════════════════════════
       BADGES
    ══════════════════════════════════════════ */
    .rpe-badge {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
    }
    .rpe-low  { background: #dcfce7; color: #15803d; }
    .rpe-mid  { background: #fef3c7; color: #92400e; }
    .rpe-high { background: #fee2e2; color: #991b1b; }

    /* ACWR */
    .acwr-badge {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 800;
    }
    .acwr-optimal { background: #dcfce7; color: #15803d; }
    .acwr-low     { background: #dbeafe; color: #1e40af; }
    .acwr-caution { background: #fef3c7; color: #92400e; }
    .acwr-danger  { background: #fee2e2; color: #991b1b; }
    .acwr-none    { background: var(--bg); color: var(--muted); }

    .acwr-zone-bar {
      position: relative;
      height: 8px;
      border-radius: 4px;
      background: linear-gradient(to right,
        #93c5fd 0%, #93c5fd 22%,
        #86efac 22%, #86efac 61%,
        #fcd34d 61%, #fcd34d 78%,
        #fca5a5 78%, #fca5a5 100%);
      margin-bottom: 6px;
    }

    .acwr-zone-marker {
      position: absolute;
      top: -4px;
      width: 16px;
      height: 16px;
      background: var(--navy);
      border-radius: 50%;
      transform: translateX(-50%);
      border: 2px solid white;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
      transition: left 0.5s;
    }

    .acwr-zones-label {
      display: flex;
      justify-content: space-between;
      font-size: 9px;
      color: var(--muted);
      font-weight: 600;
      margin-top: 2px;
    }

    /* Session type badges */
    .session-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 700;
      margin: 1px;
    }
    .sb-la { background: #dbeafe; color: #1e40af; }
    .sb-lb { background: #dcfce7; color: #166534; }
    .sb-ua { background: #ede9fe; color: #5b21b6; }
    .sb-ub { background: #ffedd5; color: #9a3412; }

    /* ══════════════════════════════════════════
       MINI BAR
    ══════════════════════════════════════════ */
    .mini-bar-wrap { display: flex; align-items: center; gap: 8px; }
    .mini-bar-bg { flex: 1; height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
    .mini-bar-fill { height: 100%; border-radius: 3px; background: var(--blue2); transition: width 0.4s; }

    /* ══════════════════════════════════════════
       COMPLIANCE HEATMAP
    ══════════════════════════════════════════ */
    .heatmap-headers {
      display: flex;
      gap: 4px;
      margin-bottom: 6px;
      padding-left: 38px;
    }
    .heatmap-headers span {
      flex: 1;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
    }
    .heatmap-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
    .heatmap-label { font-size: 12px; font-weight: 700; color: var(--navy); width: 30px; flex-shrink: 0; }
    .heatmap-cells { display: flex; gap: 4px; flex: 1; }
    .heatmap-cell {
      flex: 1;
      height: 32px;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      transition: transform 0.15s;
    }
    .heatmap-cell:hover { transform: scale(1.06); }
    .heatmap-cell.done { background: var(--blue2); color: white; }
    .heatmap-cell.miss { background: #fee2e2; color: #991b1b; }
    .heatmap-cell.none { background: var(--bg); color: var(--muted); }

    /* ══════════════════════════════════════════
       PB TABLE
    ══════════════════════════════════════════ */
    .pb-table { width: 100%; border-collapse: collapse; }
    .pb-table th {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      text-align: left;
      padding: 6px 10px;
      border-bottom: 2px solid var(--border);
      background: #f8fafd;
    }
    .pb-table td {
      padding: 9px 10px;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
    }
    .pb-table tr:last-child td { border-bottom: none; }
    .pb-val { font-weight: 800; color: var(--navy); }

    /* ══════════════════════════════════════════
       EXERCISE GRID
    ══════════════════════════════════════════ */
    .exercise-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }

    .ex-card {
      background: white;
      border-radius: 12px;
      padding: 14px 16px;
      box-shadow: 0 1px 4px rgba(7,18,43,0.07);
      border-top: 3px solid var(--blue2);
    }

    .ex-card-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ══════════════════════════════════════════
       COMPARISON
    ══════════════════════════════════════════ */
    .compare-controls {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      align-items: center;
    }

    .compare-select {
      padding: 8px 12px;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      outline: none;
      cursor: pointer;
      background: white;
      color: var(--text);
    }

    .compare-select:focus { border-color: var(--blue2); }

    /* ══════════════════════════════════════════
       TESTING SPECIFIC
    ══════════════════════════════════════════ */
    .year-tabs { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }

    .year-tab {
      padding: 9px 22px;
      border: 2px solid var(--border);
      border-radius: 10px;
      background: white;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .year-tab:hover { border-color: var(--blue2); color: var(--blue2); }

    .year-tab.active {
      background: var(--navy2);
      border-color: var(--blue2);
      color: white;
    }

    .year-tab .count {
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 1px 7px;
      font-size: 11px;
      margin-left: 5px;
    }

    .year-tab:not(.active) .count { background: var(--bg); color: var(--muted); }

    .rank-table { width: 100%; border-collapse: collapse; }
    .rank-table th {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      text-align: left;
      padding: 8px 12px;
      border-bottom: 2px solid var(--border);
      background: #f8fafd;
    }
    .rank-table th.center { text-align: center; }
    .rank-table td { padding: 11px 12px; font-size: 13px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .rank-table tr:last-child td { border-bottom: none; }
    .rank-table tr:hover td { background: #f5f8ff; }

    .rank-num { font-size: 18px; font-weight: 900; width: 36px; text-align: center; }
    .rank-1 { color: var(--gold); }
    .rank-2 { color: var(--silver); }
    .rank-3 { color: var(--bronze); }
    .rank-other { color: var(--muted); }

    .score-cell { text-align: center; font-weight: 600; font-size: 13px; }
    .score-good { color: #166534; }
    .score-mid  { color: #92400e; }
    .score-low  { color: var(--muted); }
    .no-score   { color: #d1d5db; font-size: 12px; }

    .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .bar-name { width: 120px; font-size: 12px; font-weight: 600; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bar-wrap { flex: 1; height: 26px; background: var(--bg); border-radius: 7px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 7px; display: flex; align-items: center; padding-right: 8px; justify-content: flex-end; font-size: 11px; font-weight: 700; color: white; transition: width 0.6s ease; white-space: nowrap; min-width: 36px; }
    .bar-rank { width: 26px; font-size: 12px; font-weight: 800; text-align: center; flex-shrink: 0; }

    .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
    .tests-badge { display: inline-block; padding: 2px 8px; background: var(--bg); border-radius: 20px; font-size: 11px; font-weight: 700; color: var(--muted); }

    /* ══════════════════════════════════════════
       LOGGER SPECIFIC
    ══════════════════════════════════════════ */
    #page-logger .main { max-width: 520px; padding: 16px; padding-bottom: 100px; }

    .select-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }

    .field-group label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    select, input[type="number"], input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid var(--border);
      border-radius: 10px;
      font-size: 16px;
      color: var(--text);
      background: white;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }

    select:focus, input:focus { border-color: var(--blue2); }

    .exercise-card {
      background: var(--navy);
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 12px;
      box-shadow: 0 2px 10px rgba(7,18,43,0.2);
    }

    .exercise-select {
      background: rgba(255,255,255,0.1) !important;
      border: 1px solid rgba(255,255,255,0.2) !important;
      color: white !important;
      font-size: 15px !important;
      font-weight: 600;
      padding: 10px 12px !important;
      margin-bottom: 12px;
      border-radius: 8px !important;
    }

    .exercise-select option { background: var(--navy2); color: white; }

    .set-header {
      display: grid;
      grid-template-columns: 50px 1fr 1fr 1fr;
      gap: 6px;
      margin-bottom: 6px;
      padding: 0 2px;
    }

    .set-header span {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: rgba(255,255,255,0.45);
      text-align: center;
    }

    .set-header span:first-child { text-align: left; }

    .set-row {
      display: grid;
      grid-template-columns: 50px 1fr 1fr 1fr;
      gap: 6px;
      margin-bottom: 6px;
      align-items: center;
    }

    .set-label { font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.75); }

    .set-row input, .set-row select {
      background: rgba(255,255,255,0.95) !important;
      border: none !important;
      border-radius: 8px !important;
      font-size: 16px !important;
      font-weight: 600;
      text-align: center;
      padding: 10px 4px !important;
      color: var(--navy) !important;
      height: 44px;
    }

    .set-row select { font-size: 12px !important; padding: 4px !important; }

    .submit-wrap {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 14px 20px;
      background: linear-gradient(transparent, var(--bg) 30%);
      z-index: 50;
    }

    .submit-btn {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      display: block;
      padding: 18px;
      background: var(--blue);
      color: white;
      font-size: 17px;
      font-weight: 700;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(26,86,219,0.4);
      transition: all 0.2s;
      letter-spacing: 0.3px;
    }

    .submit-btn:active { transform: scale(0.98); opacity: 0.9; }
    .submit-btn:disabled { background: var(--muted); box-shadow: none; cursor: not-allowed; }

    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--navy);
      color: white;
      padding: 14px 24px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      z-index: 200;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      transition: opacity 0.4s;
      white-space: nowrap;
    }

    .toast.success { background: #064e3b; border-left: 4px solid var(--green); }
    .toast.error   { background: #7f1d1d; border-left: 4px solid var(--red); }
    .toast.hidden  { opacity: 0; pointer-events: none; }

    .session-label {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin: 20px 0 10px;
    }

    /* ══════════════════════════════════════════
       LOADING / EMPTY
    ══════════════════════════════════════════ */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: var(--muted);
      font-size: 15px;
      gap: 10px;
    }

    .spinner {
      width: 20px;
      height: 20px;

    /* ══════════════════════════════════════════
       RESPONSIVE

    @media (max-width: 768px) {

<script>
// ══════════════════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════════════════
const API_BASE = 'https://superagent-84188511.base44.app/functions';

function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.app-nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`page-${page}`).classList.add('active');
  document.getElementById(`nav-${page}`).classList.add('active');
  document.getElementById('dashSubBar').classList.toggle('on', page === 'dashboard');
  document.getElementById('testingSubBar').classList.toggle('on', page === 'testing');
  if (page === 'testing' && !testingData) testingLoadData();
}

// ══════════════════════════════════════════════════════════
// DASHBOARD
// ══════════════════════════════════════════════════════════
let currentView = 'coach';
let coachData = null;
const charts = {};

function destroyCharts() {
  Object.values(charts).forEach(c => { try { c.destroy(); } catch(_) {} });
  Object.keys(charts).forEach(k => delete charts[k]);
}

function switchView(view) {
  currentView = view;
  document.getElementById('dashBtnCoach').classList.toggle('active', view === 'coach');
  document.getElementById('dashBtnAthlete').classList.toggle('active', view === 'athlete');
  document.getElementById('dashAthleteBar').classList.toggle('on', view === 'athlete');
  if (view === 'coach') loadCoachView();
  else loadAthleteView();
}

async function fetchData(payload) {
  const res = await fetch(`${API_BASE}/getDashboardData`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });
  if (!res.ok) throw new Error(`API error ${res.status}`);
  return res.json();
}

async function loadCoachView() {
  destroyCharts();
  document.getElementById('mainContent').innerHTML = '<div class="loading"><div class="spinner"></div> Loading squad data…</div>';
  try {
    coachData = await fetchData({ view: 'coach' });
    renderCoachView(coachData);
  } catch(e) {
    document.getElementById('mainContent').innerHTML = `<div class="empty">Error: ${e.message}</div>`;
  }
}

function renderCoachView(data) {
  const { athleteSummary, rpeTrend, athletes } = data;
  const totalSessions = athleteSummary.reduce((a,b) => a + b.totalSessions, 0);
  const avgRpe = athleteSummary.length
    ? (athleteSummary.reduce((a,b) => a + b.avgRpe, 0) / athleteSummary.length).toFixed(1)
    : '—';
  const highRpeTotal = athleteSummary.reduce((a,b) => a + b.highRpeSets, 0);
  const activeAthletes = athleteSummary.filter(a => {
    if (!a.lastSession) return false;
    return (new Date() - new Date(a.lastSession)) / 86400000 <= 7;
  }).length;

  document.getElementById('mainContent').innerHTML = `
    <div class="section-title">Squad Overview</div>
    <div class="stats-grid">
      <div class="stat-card c-green">
        <div class="stat-label">Active This Week</div>
        <div class="stat-value">${activeAthletes}<span style="font-size:14px;color:var(--muted)">/${athletes.length}</span></div>
        <div class="stat-sub">Athletes trained</div>
      </div>
      <div class="stat-card c-navy">
        <div class="stat-label">Total Sessions</div>
        <div class="stat-value">${totalSessions}</div>
        <div class="stat-sub">All time</div>
      </div>
      <div class="stat-card c-amber">
        <div class="stat-label">Avg Squad RPE</div>
        <div class="stat-value">${avgRpe}</div>
        <div class="stat-sub">All athletes</div>
      </div>
      <div class="stat-card c-red">
        <div class="stat-label">High RPE Sets</div>
        <div class="stat-value">${highRpeTotal}</div>
        <div class="stat-sub">RPE ≥ 9</div>
      </div>
    </div>

    <div class="section-title">Session Compliance — Last 4 Weeks</div>
    <div class="card">
      <div class="card-title">Did each athlete complete each session type this week?</div>
      <div id="complianceHeatmap"></div>
    </div>

    <div class="section-title">Athlete Summary</div>
    <div class="card">
      <table class="data-table" id="athleteTable">
        <thead><tr>
          <th>Athlete</th><th>Last Session</th><th>Sessions</th>
          <th>Session Types</th><th>Avg RPE</th><th>⚡ RPE≥9</th><th>ACWR</th><th>Weekly Volume</th>
        </tr></thead>
        <tbody id="athleteTableBody"></tbody>
      </table>
    </div>

    <div class="section-title">Athlete Comparison</div>
    <div class="card">
      <div class="card-title">Compare two athletes on a key exercise</div>
      <div class="compare-controls">
        <select class="compare-select" id="compareAth1">${athletes.map(a=>`<option>${a}</option>`).join('')}</select>
        <span style="color:var(--muted);font-weight:700">vs</span>
        <select class="compare-select" id="compareAth2">${athletes.map((a,i)=>`<option ${i===1?'selected':''}>${a}</option>`).join('')}</select>
        <select class="compare-select" id="compareExercise">
          <option>BB BACK SQUAT (HEELS ELEVATED)</option>
          <option>BENCH PRESS</option><option>BB RDL</option>
          <option>BENCH PULL</option><option>BB SHOULDER PRESS</option>
          <option>CHIN UPS</option><option>BB HIGH PULL</option>
          <option>FRONT FOOT ELEVATED SPLIT SQUAT</option>
        </select>
        <button onclick="renderComparison()"
          style="padding:8px 18px;background:var(--blue);color:white;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:13px;">
          Compare
        </button>
      </div>
      <canvas id="compareChart" height="80"></canvas>
    </div>

    <div class="section-title">Squad ACWR — Acute:Chronic Workload Ratio</div>
    <div class="card">
      <div class="card-title">Rolling 7-day acute ÷ 28-day chronic — optimal 0.8–1.3, danger &gt;1.5</div>
      <div class="acwr-zone-bar" style="margin-bottom:16px">
        <div class="acwr-zone-marker" id="squadACWRMarker" style="left:50%"></div>
      </div>
      <div class="acwr-zones-label">
        <span>Under (&lt;0.8)</span><span>Optimal (0.8–1.3)</span><span>Caution</span><span>Danger (&gt;1.5)</span>
      </div>
      <br/>
      <canvas id="squadACWRChart" height="70"></canvas>
    </div>

    <div class="section-title">Squad RPE Trend</div>
    <div class="card">
      <div class="card-title">Average Squad RPE — Last 30 Days</div>
      <canvas id="rpeChart" height="70"></canvas>
    </div>
  `;

  // Compliance heatmap
  renderComplianceHeatmap(athleteSummary, athletes);

  // Athlete table
  const tbody = document.getElementById('athleteTableBody');
  const maxSess = Math.max(...athleteSummary.map(a => a.totalSessions), 1);
  athleteSummary.forEach(a => {
    const rpeClass = a.avgRpe >= 8.5 ? 'rpe-high' : a.avgRpe >= 7.5 ? 'rpe-mid' : 'rpe-low';
    const daysSince = a.lastSession ? Math.floor((new Date() - new Date(a.lastSession)) / 86400000) : null;
    const lastStr = daysSince === null ? '—' : daysSince === 0 ? 'Today' : daysSince === 1 ? 'Yesterday' : `${daysSince}d ago`;
    const lastVol = a.weeklyLoad[3]?.totalVolume || 0;
    const maxVol = Math.max(...a.weeklyLoad.map(w => w.totalVolume), 1);
    const sessionBadges = Object.entries(a.sessionCounts).filter(([,v])=>v>0)
      .map(([k,v]) => {
        const cls = k==='Lower A'?'sb-la':k==='Lower B'?'sb-lb':k==='Upper A'?'sb-ua':'sb-ub';
        return `<span class="session-badge ${cls}">${k} ×${v}</span>`;
      }).join('');
    const acwr = a.latestACWR?.acwr;
    const acwrCls = !acwr ? 'acwr-none' : acwr < 0.8 ? 'acwr-low' : acwr <= 1.3 ? 'acwr-optimal' : acwr <= 1.5 ? 'acwr-caution' : 'acwr-danger';
    const tr = document.createElement('tr');
    tr.onclick = () => {
      switchView('athlete');
      document.getElementById('athleteSelect').value = a.athlete;
      loadAthleteView();
    };
    tr.innerHTML = `
      <td><span class="athlete-name">${a.athlete}</span></td>
      <td style="color:${daysSince>7?'var(--red)':'var(--text)'};font-weight:${daysSince>7?700:400}">${lastStr}</td>
      <td><div class="mini-bar-wrap">
        <div class="mini-bar-bg"><div class="mini-bar-fill" style="width:${Math.round(a.totalSessions/maxSess*100)}%"></div></div>
        <span style="font-size:13px;font-weight:700">${a.totalSessions}</span>
      </div></td>
      <td>${sessionBadges||'<span style="color:var(--muted)">—</span>'}</td>
      <td><span class="rpe-badge ${rpeClass}">${a.avgRpe}</span></td>
      <td style="color:${a.highRpeSets>3?'var(--red)':'var(--text)'};font-weight:${a.highRpeSets>3?700:400}">${a.highRpeSets}</td>
      <td><span class="acwr-badge ${acwrCls}">${acwr?acwr.toFixed(2):'—'}</span></td>
      <td><div class="mini-bar-wrap">
        <div class="mini-bar-bg" style="background:#dbeafe">
          <div class="mini-bar-fill" style="width:${Math.round(lastVol/maxVol*100)}%;background:var(--blue2)"></div>
        </div>
        <span style="font-size:11px;color:var(--muted)">${lastVol>0?lastVol.toLocaleString():'—'}</span>
      </div></td>
    `;
    tbody.appendChild(tr);
  });

  // Squad ACWR chart
  const squadACWR = data.squadACWR || [];
  if (squadACWR.length > 0) {
    const acwrPlugin = {
      id: 'acwrZones',
      beforeDraw(chart) {
        const {ctx, chartArea:{left,right}, scales:{y}} = chart;
        [{min:0,max:0.8,color:'rgba(147,197,253,0.15)'},{min:0.8,max:1.3,color:'rgba(134,239,172,0.2)'},{min:1.3,max:1.5,color:'rgba(252,211,77,0.2)'},{min:1.5,max:2.5,color:'rgba(252,165,165,0.2)'}]
        .forEach(z => {
          const yT = y.getPixelForValue(Math.min(z.max,y.max));
          const yB = y.getPixelForValue(Math.max(z.min,y.min));
          ctx.fillStyle = z.color;
          ctx.fillRect(left, yT, right-left, yB-yT);
        });
      }
    };
    const acwrCtx = document.getElementById('squadACWRChart').getContext('2d');
    charts['squadACWR'] = new Chart(acwrCtx, {
      type:'line', plugins:[acwrPlugin],
      data:{ labels:squadACWR.map(r=>r.date.slice(5)), datasets:[
        {label:'ACWR', data:squadACWR.map(r=>r.acwr), borderColor:var_navy(), backgroundColor:'rgba(7,18,43,0.05)', borderWidth:2.5, pointRadius:2, fill:true, tension:0.4, yAxisID:'y'},
        {label:'Acute (7d)', data:squadACWR.map(r=>r.acute), borderColor:'#3b82f6', borderWidth:1.5, borderDash:[4,3], pointRadius:0, fill:false, tension:0.4, yAxisID:'y2'},
        {label:'Chronic (28d)', data:squadACWR.map(r=>r.chronic), borderColor:'#60a5fa', borderWidth:1.5, borderDash:[4,3], pointRadius:0, fill:false, tension:0.4, yAxisID:'y2'},
      ]},
      options:{responsive:true, interaction:{mode:'index',intersect:false},
        plugins:{legend:{labels:{font:{size:11},boxWidth:12}}},
        scales:{
          y:{position:'left',min:0,max:2,grid:{color:'#f0f4f8'},ticks:{font:{size:11}},title:{display:true,text:'ACWR',font:{size:11}}},
          y2:{position:'right',grid:{drawOnChartArea:false},ticks:{font:{size:11}},title:{display:true,text:'Load (kg×reps)',font:{size:10}}},
          x:{grid:{display:false},ticks:{font:{size:10},maxTicksLimit:14}}
        }
      }
    });
    const latest = squadACWR[squadACWR.length-1];
    if (latest) {
      const pct = Math.min(Math.max((latest.acwr/2)*100, 2), 98);
      const marker = document.getElementById('squadACWRMarker');
      if (marker) marker.style.left = pct + '%';
    }
  }

  // RPE trend
  if (rpeTrend.length > 0) {
    const ctx = document.getElementById('rpeChart').getContext('2d');
    charts['rpe'] = new Chart(ctx, {
      type:'line',
      data:{ labels:rpeTrend.map(r=>r.date.slice(5)), datasets:[{
        label:'Avg RPE', data:rpeTrend.map(r=>r.avgRpe),
        borderColor:'#1a56db', backgroundColor:'rgba(26,86,219,0.07)',
        borderWidth:2, pointRadius:3, fill:true, tension:0.4
      }]},
      options:{responsive:true, plugins:{legend:{display:false}},
        scales:{
          y:{min:5,max:10,grid:{color:'#f0f4f8'},ticks:{font:{size:11}}},
          x:{grid:{display:false},ticks:{font:{size:10},maxTicksLimit:14}}
        }
      }
    });
  }

  setTimeout(renderComparison, 200);
}

function renderComplianceHeatmap(athleteSummary, athletes) {
  const sessions = ['Lower A','Lower B','Upper A','Upper B'];
  const now = new Date();
  const weeks = [3,2,1,0].map(w => {
    const d = new Date(now);
    d.setDate(d.getDate() - w*7);
    return d.toISOString().slice(0,10).slice(0,7);
  });
  const html = `
    <div class="heatmap-headers">${weeks.map(w=>`<span>${w}</span>`).join('')}</div>
    ${athletes.map(ath => {
      const as = athleteSummary.find(a=>a.athlete===ath);
      const cells = weeks.map(wk => {
        const done = as?.sessionDates?.some(d=>d.startsWith(wk));
        const cls = done === undefined ? 'none' : done ? 'done' : 'miss';
        return `<div class="heatmap-cell ${cls}">${done?'✓':''}</div>`;
      }).join('');
      return `<div class="heatmap-row">
        <div class="heatmap-label">${ath}</div>
        <div class="heatmap-cells">${cells}</div>
      </div>`;
    }).join('')}
  `;
  document.getElementById('complianceHeatmap').innerHTML = html;
}

async function renderComparison() {
  if (!coachData) return;
  const ath1 = document.getElementById('compareAth1')?.value;
  const ath2 = document.getElementById('compareAth2')?.value;
  const exercise = document.getElementById('compareExercise')?.value;
  if (!ath1 || !ath2 || !exercise) return;

  try {
    const [d1, d2] = await Promise.all([
      fetchData({ view:'athlete', athlete:ath1 }),
      fetchData({ view:'athlete', athlete:ath2 })
    ]);
    const ep1 = d1.exerciseProgressions?.find(e=>e.exercise===exercise);
    const ep2 = d2.exerciseProgressions?.find(e=>e.exercise===exercise);
    if (charts['compare']) { charts['compare'].destroy(); delete charts['compare']; }
    const ctx = document.getElementById('compareChart').getContext('2d');
    const allDates = [...new Set([...(ep1?.points||[]).map(p=>p.date), ...(ep2?.points||[]).map(p=>p.date)])].sort();
    charts['compare'] = new Chart(ctx, {
      type:'line',
      data:{ labels:allDates.map(d=>d.slice(5)), datasets:[
        { label:ath1, data:allDates.map(d=>ep1?.points.find(p=>p.date===d)?.avgLoad||null), borderColor:'#1a56db', borderWidth:2.5, pointRadius:4, fill:false, tension:0.4, spanGaps:true },
        { label:ath2, data:allDates.map(d=>ep2?.points.find(p=>p.date===d)?.avgLoad||null), borderColor:'#3b82f6', borderWidth:2.5, pointRadius:4, fill:false, tension:0.4, spanGaps:true, borderDash:[5,3] },
      ]},
      options:{responsive:true, interaction:{mode:'index',intersect:false},
        plugins:{legend:{labels:{font:{size:12},boxWidth:14}},title:{display:true,text:exercise,font:{size:12},color:'#5a6a8a'}},
        scales:{y:{grid:{color:'#f0f4f8'},ticks:{font:{size:11}}},x:{grid:{display:false},ticks:{font:{size:10}}}}
      }
    });
  } catch(_) {}
}

async function loadAthleteView() {
  destroyCharts();
  document.getElementById('mainContent').innerHTML = '<div class="loading"><div class="spinner"></div> Loading athlete data…</div>';
  const athlete = document.getElementById('athleteSelect').value;
  try {
    const data = await fetchData({ view:'athlete', athlete });
    renderAthleteView(data);
  } catch(e) {
    document.getElementById('mainContent').innerHTML = `<div class="empty">Error: ${e.message}</div>`;
  }
}

function renderAthleteView(data) {
  const { athlete, sessionHistory, exerciseProgressions, pbs, weeklyVol, latestACWR, acwrSeries } = data;

  const acwr = latestACWR?.acwr;
  const acwrCls = !acwr ? 'acwr-none' : acwr < 0.8 ? 'acwr-low' : acwr <= 1.3 ? 'acwr-optimal' : acwr <= 1.5 ? 'acwr-caution' : 'acwr-danger';
  const totalVol = weeklyVol.reduce((a,b)=>a+b.vol,0);
  const avgRpe = sessionHistory.length ? (sessionHistory.reduce((a,b)=>a+(b.avgRpe||0),0)/sessionHistory.length).toFixed(1) : '—';

  document.getElementById('mainContent').innerHTML = `
    <div class="section-title">Athlete Overview — ${athlete}</div>
    <div class="stats-grid">
      <div class="stat-card c-navy">
        <div class="stat-label">Sessions Logged</div>
        <div class="stat-value">${sessionHistory.length}</div>
        <div class="stat-sub">All time</div>
      </div>
      <div class="stat-card c-amber">
        <div class="stat-label">Avg RPE</div>
        <div class="stat-value">${avgRpe}</div>
        <div class="stat-sub">All sessions</div>
      </div>
      <div class="stat-card c-green">
        <div class="stat-label">Total Tonnage</div>
        <div class="stat-value" style="font-size:20px">${totalVol.toLocaleString()}</div>
        <div class="stat-sub">kg × reps (6 weeks)</div>
      </div>
      <div class="stat-card ${acwrCls==='acwr-danger'?'c-red':acwrCls==='acwr-caution'?'c-amber':acwrCls==='acwr-optimal'?'c-green':''}">
        <div class="stat-label">ACWR</div>
        <div class="stat-value" style="font-size:24px">${acwr?acwr.toFixed(2):'—'}</div>
        <div class="stat-sub"><span class="acwr-badge ${acwrCls}" style="font-size:10px">${acwrCls.replace('acwr-','').toUpperCase()}</span></div>
      </div>
    </div>

    <div class="two-col">
      <div>
        <div class="section-title">Personal Bests</div>
        <div class="card">
          <table class="pb-table">
            <thead><tr><th>Exercise</th><th>Best Load</th><th>Reps</th><th>Date</th></tr></thead>
            <tbody id="pbBody"></tbody>
          </table>
        </div>
      </div>
      <div>
        <div class="section-title">Weekly Volume (Tonnage)</div>
        <div class="card">
          <div class="card-title">kg × reps — last 6 weeks</div>
          <canvas id="volChart" height="140"></canvas>
        </div>
      </div>
    </div>

    <div class="section-title">ACWR — Acute:Chronic Workload Ratio</div>
    <div class="card">
      <div class="card-title">Rolling 7-day (acute) ÷ 28-day (chronic) daily volume — optimal: 0.8–1.3</div>
      <canvas id="athleteACWRChart" height="80"></canvas>
    </div>

    <div class="section-title">Session History</div>
    <div class="card">
      <table class="data-table">
        <thead><tr><th>Date</th><th>Session</th><th>Exercises</th><th>Sets</th><th>Avg RPE</th></tr></thead>
        <tbody id="historyBody"></tbody>
      </table>
    </div>

    <div class="section-title">Exercise Progressions — Load &amp; RPE</div>
    <div class="exercise-grid" id="exerciseGrid"></div>
  `;

  // PBs
  const pbBody = document.getElementById('pbBody');
  if (!pbs.length) {
    pbBody.innerHTML = '<tr><td colspan="4" style="color:var(--muted);text-align:center;padding:20px">No load data yet</td></tr>';
  } else {
    pbs.forEach(([ex, pb], i) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td style="font-size:11px;font-weight:600">${i===0?'🏆 ':''}${ex}</td><td class="pb-val">${pb.load}kg</td><td style="color:var(--muted)">${pb.reps||'—'}</td><td style="color:var(--muted);font-size:12px">${pb.date||'—'}</td>`;
      pbBody.appendChild(tr);
    });
  }

  // Athlete ACWR
  if (acwrSeries?.length > 0) {
    setTimeout(() => {
      const aCtx = document.getElementById('athleteACWRChart')?.getContext('2d');
      if (!aCtx) return;
      const acwrPlugin = {
        id:'acwrZones',
        beforeDraw(chart) {
          const {ctx, chartArea:{left,right}, scales:{y}} = chart;
          [{min:0,max:0.8,color:'rgba(147,197,253,0.15)'},{min:0.8,max:1.3,color:'rgba(134,239,172,0.2)'},{min:1.3,max:1.5,color:'rgba(252,211,77,0.2)'},{min:1.5,max:2.5,color:'rgba(252,165,165,0.2)'}]
          .forEach(z => {
            ctx.fillStyle = z.color;
            ctx.fillRect(left, y.getPixelForValue(Math.min(z.max,y.max)), right-left, y.getPixelForValue(Math.max(z.min,y.min))-y.getPixelForValue(Math.min(z.max,y.max)));
          });
        }
      };
      charts['athleteACWR'] = new Chart(aCtx, {
        type:'line', plugins:[acwrPlugin],
        data:{ labels:acwrSeries.map(r=>r.date.slice(5)), datasets:[
          {label:'ACWR', data:acwrSeries.map(r=>r.acwr), borderColor:var_navy(), backgroundColor:'rgba(7,18,43,0.05)', borderWidth:2.5, pointRadius:2, fill:true, tension:0.4, yAxisID:'y'},
          {label:'Acute (7d)', data:acwrSeries.map(r=>r.acute), borderColor:'#3b82f6', borderWidth:1.5, borderDash:[4,3], pointRadius:0, fill:false, tension:0.4, yAxisID:'y2'},
          {label:'Chronic (28d)', data:acwrSeries.map(r=>r.chronic), borderColor:'#60a5fa', borderWidth:1.5, borderDash:[4,3], pointRadius:0, fill:false, tension:0.4, yAxisID:'y2'},
        ]},
        options:{responsive:true,interaction:{mode:'index',intersect:false},
          plugins:{legend:{labels:{font:{size:11},boxWidth:12}}},
          scales:{
            y:{position:'left',min:0,max:2,grid:{color:'#f0f4f8'},ticks:{font:{size:11}},title:{display:true,text:'ACWR',font:{size:11}}},
            y2:{position:'right',grid:{drawOnChartArea:false},ticks:{font:{size:11}},title:{display:true,text:'Load (kg×reps)',font:{size:10}}},
            x:{grid:{display:false},ticks:{font:{size:10},maxTicksLimit:14}}
          }
        }
      });
    }, 50);
  }

  // Volume chart
  const vCtx = document.getElementById('volChart').getContext('2d');
  charts['vol'] = new Chart(vCtx, {
    type:'bar',
    data:{ labels:weeklyVol.map(w=>w.week), datasets:[{
      label:'Volume (kg×reps)', data:weeklyVol.map(w=>w.vol),
      backgroundColor: weeklyVol.map((_,i)=>i===5?'rgba(26,86,219,0.85)':'rgba(59,130,246,0.35)'),
      borderRadius:7
    }]},
    options:{responsive:true,plugins:{legend:{display:false}},
      scales:{y:{grid:{color:'#f0f4f8'},ticks:{font:{size:11}}},x:{grid:{display:false},ticks:{font:{size:11}}}}
    }
  });

  // Session history
  const hBody = document.getElementById('historyBody');
  sessionHistory.forEach(s => {
    const cls = s.session_type==='Lower A'?'sb-la':s.session_type==='Lower B'?'sb-lb':s.session_type==='Upper A'?'sb-ua':'sb-ub';
    const rpeClass = s.avgRpe>=8.5?'rpe-high':s.avgRpe>=7.5?'rpe-mid':'rpe-low';
    const tr = document.createElement('tr');
    tr.innerHTML = `<td style="font-weight:600">${s.date}</td><td><span class="session-badge ${cls}">${s.session_type}</span></td><td style="color:var(--muted);font-size:12px">${s.exercises.slice(0,3).join(', ')}${s.exercises.length>3?` +${s.exercises.length-3}`:''}</td><td style="font-weight:600">${s.totalSets}</td><td><span class="rpe-badge ${rpeClass}">${s.avgRpe||'—'}</span></td>`;
    hBody.appendChild(tr);
  });

  // Exercise progressions
  const grid = document.getElementById('exerciseGrid');
  const validEps = (exerciseProgressions||[]).filter(ep => ep.points.length >= 1);
  if (!validEps.length) { grid.innerHTML = '<div class="empty">No exercise data yet</div>'; return; }
  validEps.forEach((ep, idx) => {
    const div = document.createElement('div'); div.className = 'ex-card';
    const cid = `ex_${idx}`;
    div.innerHTML = `<div class="ex-card-title">${ep.exercise}</div><canvas id="${cid}" height="120"></canvas>`;
    grid.appendChild(div);
    setTimeout(() => {
      const ctx = document.getElementById(cid)?.getContext('2d');
      if (!ctx) return;
      const hasLoad = ep.points.some(p=>p.avgLoad!==null);
      charts[cid] = new Chart(ctx, {
        type:'line',
        data:{ labels:ep.points.map(p=>p.date.slice(5)), datasets:[
          ...(hasLoad?[{label:'Load (kg)',data:ep.points.map(p=>p.avgLoad),borderColor:'#1a56db',backgroundColor:'rgba(26,86,219,0.07)',borderWidth:2,pointRadius:4,fill:true,tension:0.4,yAxisID:'y'}]:[]),
          {label:'RPE',data:ep.points.map(p=>p.avgRpe),borderColor:'#f59e0b',borderWidth:2,borderDash:[4,3],pointRadius:3,fill:false,tension:0.4,yAxisID:hasLoad?'y2':'y'}
        ]},
        options:{responsive:true,interaction:{mode:'index',intersect:false},
          plugins:{legend:{display:ep.points.length>1,labels:{font:{size:10},boxWidth:10}}},
          scales:{
            y:{position:'left',grid:{color:'#f0f4f8'},ticks:{font:{size:10}},title:{display:hasLoad,text:'kg',font:{size:10}}},
            ...(hasLoad?{y2:{position:'right',min:5,max:10,grid:{drawOnChartArea:false},ticks:{font:{size:10}},title:{display:true,text:'RPE',font:{size:10}}}}:{}),
            x:{grid:{display:false},ticks:{font:{size:10}}}
          }
        }
      });
    }, 50);
  });
}

function var_navy() { return '#07122b'; }

// ══════════════════════════════════════════════════════════
// LOGGER
// ══════════════════════════════════════════════════════════
const LOG_API = `${API_BASE}/submitSession`;

const SESSIONS = {
  'Lower A': [
    {name:'BB HIGH PULL', sets:3},
    {name:'HURDLE JUMP AND STICK', sets:3},
    {name:'BB BACK SQUAT (HEELS ELEVATED)', sets:5},
    {name:'ANKLE DORSIFLEXION', sets:3},
    {name:'FRONT FOOT ELEVATED SPLIT SQUAT', sets:3},
    {name:'GHD ANTI-LATERAL FLEXION HOLD', sets:3},
    {name:'ECCENTRIC HAMSTRING SLIDERS', sets:3}
  ],
  'Lower B': [
    {name:'BB RDL', sets:4},
    {name:'SB ROLL OUT + PLANK HOLD', sets:3},
    {name:'BELT SQUAT', sets:4},
    {name:'HANGING STRAIGHT LEG RAISE', sets:3},
    {name:'LEG EXTENSION (DOUBLE + SINGLE)', sets:4},
    {name:'LANDMINE ROTATION', sets:3},
    {name:'SINGLE LEG HIP THRUST', sets:3}
  ],
  'Upper A': [
    {name:'CHIN UPS', sets:4},
    {name:'BENCH PRESS', sets:4},
    {name:'SINGLE ARM DB ROW (KNEELING)', sets:4},
    {name:'INCLINE DB BENCH PRESS', sets:4},
    {name:'REVERSE DB FLY (CHEST SUPPORTED)', sets:3},
    {name:'WEIGHTED SIT UPS', sets:3},
    {name:'SWISS BALL DEADBUG', sets:3}
  ],
  'Upper B': [
    {name:'BENCH PULL', sets:4},
    {name:'1/2 KNEELING WALL THORACIC ROTATION', sets:3},
    {name:'BB SHOULDER PRESS', sets:4},
    {name:'1/2 KNEELING BANDED CUBAN PRESS', sets:3},
    {name:'DB LATERAL RAISE', sets:3},
    {name:'BICEPS OF YOUR CHOICE', sets:3},
    {name:'PALLOF PRESS - ISO HOLD', sets:3}
  ]
};

const ALL_EXERCISES = [
  'BB HIGH PULL','HURDLE JUMP AND STICK','BB BACK SQUAT (HEELS ELEVATED)',
  'ANKLE DORSIFLEXION','FRONT FOOT ELEVATED SPLIT SQUAT','GHD ANTI-LATERAL FLEXION HOLD',
  'ECCENTRIC HAMSTRING SLIDERS','BB RDL','SB ROLL OUT + PLANK HOLD','BELT SQUAT',
  'HANGING STRAIGHT LEG RAISE','LEG EXTENSION (DOUBLE + SINGLE)','LANDMINE ROTATION',
  'SINGLE LEG HIP THRUST','CHIN UPS','BENCH PRESS','SINGLE ARM DB ROW (KNEELING)',
  'INCLINE DB BENCH PRESS','REVERSE DB FLY (CHEST SUPPORTED)','WEIGHTED SIT UPS',
  'SWISS BALL DEADBUG','BENCH PULL','1/2 KNEELING WALL THORACIC ROTATION',
  'BB SHOULDER PRESS','1/2 KNEELING BANDED CUBAN PRESS','DB LATERAL RAISE',
  'BICEPS OF YOUR CHOICE','PALLOF PRESS - ISO HOLD','LEG CURL',
  'BELT SQUAT','GHD HOLDS','PLANK HOLD'
];

const TIME_EXERCISES = new Set([
  'GHD ANTI-LATERAL FLEXION HOLD','ANKLE DORSIFLEXION','SB ROLL OUT + PLANK HOLD',
  'HANGING STRAIGHT LEG RAISE','SWISS BALL DEADBUG','1/2 KNEELING WALL THORACIC ROTATION',
  '1/2 KNEELING BANDED CUBAN PRESS','PALLOF PRESS - ISO HOLD','GHD HOLDS','PLANK HOLD'
]);

const BAND_EXERCISES = new Set(['CHIN UPS']);

function buildSession() {
  const session = document.getElementById('lg_sessionSelect').value;
  const exercises = SESSIONS[session] || [];
  const container = document.getElementById('lg_exerciseContainer');
  container.innerHTML = '';

  exercises.forEach((ex, exIdx) => {
    const card = document.createElement('div');
    card.className = 'exercise-card';
    const exName = ex.name;
    const repsLabel = TIME_EXERCISES.has(exName) ? 'Time (s)' : 'Reps';
    const loadLabel = BAND_EXERCISES.has(exName) ? 'Band' : 'Load (kg)';

    let html = `
      <select class="exercise-select" id="ex_${exIdx}_name" onchange="updateExerciseType(${exIdx})">
        ${ALL_EXERCISES.map(e=>`<option ${e===exName?'selected':''}>${e}</option>`).join('')}
      </select>
      <div class="set-header">
        <span>Set</span><span>${repsLabel}</span><span>${loadLabel}</span><span>RPE</span>
      </div>
    `;

    for (let s = 0; s < ex.sets; s++) {
      if (BAND_EXERCISES.has(exName)) {
        html += `<div class="set-row" id="ex_${exIdx}_set_${s}">
          <span class="set-label">Set ${s+1}</span>
          <input type="number" id="ex_${exIdx}_set_${s}_reps" placeholder="reps" inputmode="numeric" min="0" oninput="saveLS()"/>
          <select id="ex_${exIdx}_set_${s}_load">
            <option value="">Band</option>
            <option>Green</option><option>Blue</option><option>Purple</option>
            <option>Black</option><option>Red</option><option>BW</option>
          </select>
          <input type="number" id="ex_${exIdx}_set_${s}_rpe" placeholder="RPE" inputmode="numeric" min="1" max="10" oninput="saveLS()"/>
        </div>`;
      } else {
        html += `<div class="set-row" id="ex_${exIdx}_set_${s}">
          <span class="set-label">Set ${s+1}</span>
          <input type="number" id="ex_${exIdx}_set_${s}_reps" placeholder="${TIME_EXERCISES.has(exName)?'sec':'reps'}" inputmode="numeric" min="0" oninput="saveLS()"/>
          <input type="number" id="ex_${exIdx}_set_${s}_load" placeholder="kg" inputmode="decimal" min="0" step="0.5" oninput="saveLS()"/>
          <input type="number" id="ex_${exIdx}_set_${s}_rpe"  placeholder="RPE" inputmode="numeric" min="1" max="10" oninput="saveLS()"/>
        </div>`;
      }
    }
    card.innerHTML = html;
    container.appendChild(card);
  });

  restoreLS();
}

function updateExerciseType(exIdx) {
  const name = document.getElementById(`ex_${exIdx}_name`).value;
  const session = document.getElementById('lg_sessionSelect').value;
  const ex = SESSIONS[session]?.[exIdx];
  if (!ex) return;
  ex.name = name;
  buildSession();
}

function saveLS() {
  const state = {};
  const session = document.getElementById('lg_sessionSelect').value;
  const exercises = SESSIONS[session] || [];
  exercises.forEach((ex, exIdx) => {
    for (let s = 0; s < ex.sets; s++) {
      ['reps','load','rpe'].forEach(field => {
        const el = document.getElementById(`ex_${exIdx}_set_${s}_${field}`);
        if (el) state[`ex_${exIdx}_set_${s}_${field}`] = el.value;
      });
    }
  });
  localStorage.setItem('lgState', JSON.stringify(state));
}

function restoreLS() {
  try {
    const state = JSON.parse(localStorage.getItem('lgState') || '{}');
    Object.entries(state).forEach(([k,v]) => {
      const el = document.getElementById(k);
      if (el) el.value = v;
    });
  } catch(_) {}
}

function clearLS() { localStorage.removeItem('lgState'); }

function savePrefs() {
  localStorage.setItem('lgPrefs', JSON.stringify({
    athlete: document.getElementById('lg_athleteSelect').value,
    session: document.getElementById('lg_sessionSelect').value
  }));
}

function loadPrefs() {
  try {
    const p = JSON.parse(localStorage.getItem('lgPrefs') || '{}');
    if (p.athlete) document.getElementById('lg_athleteSelect').value = p.athlete;
    if (p.session)  document.getElementById('lg_sessionSelect').value = p.session;
  } catch(_) {}
}

function showToast(msg, type='success') {
  const t = document.getElementById('lg_toast');
  t.textContent = msg;
  t.className = `toast ${type}`;
  setTimeout(() => { t.className = 'toast hidden'; }, 3000);
}

async function submitSession() {
  const btn = document.getElementById('lg_submitBtn');
  const athlete = document.getElementById('lg_athleteSelect').value;
  const session = document.getElementById('lg_sessionSelect').value;
  const exercises = SESSIONS[session] || [];
  const sets = [];
  const ts = new Date().toISOString();

  exercises.forEach((ex, exIdx) => {
    const name = document.getElementById(`ex_${exIdx}_name`)?.value || ex.name;
    for (let s = 0; s < ex.sets; s++) {
      const reps = document.getElementById(`ex_${exIdx}_set_${s}_reps`)?.value;
      const load = document.getElementById(`ex_${exIdx}_set_${s}_load`)?.value;
      const rpe  = document.getElementById(`ex_${exIdx}_set_${s}_rpe`)?.value;
      if (reps || load || rpe) {
        sets.push({ timestamp:ts, athlete, session_type:session, exercise:name, set_number:s+1, reps, load, rpe: rpe ? parseInt(rpe) : null });
      }
    }
  });

  if (!sets.length) { showToast('No data entered', 'error'); return; }

  btn.disabled = true;
  btn.textContent = 'Submitting…';

  try {
    const res = await fetch(LOG_API, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ sets })
    });
    if (!res.ok) throw new Error(`Server error ${res.status}`);
    showToast(`✓ ${sets.length} sets submitted`);
    clearLS();
    buildSession();
  } catch(e) {
    showToast(`Error: ${e.message}`, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Submit Session';
  }
}

// ══════════════════════════════════════════════════════════
// TESTING
// ══════════════════════════════════════════════════════════
const TESTING_API = `${API_BASE}/getTestingData`;
const SYNC_API    = `${API_BASE}/syncTestingData`;
const BAR_COLORS  = ['#1a56db','#3b82f6','#60a5fa','#93c5fd','#a78bfa','#fb923c'];

let testingData = null;
let testActiveYear = null;

async function testingLoadData() {
  try {
    const res = await fetch(TESTING_API, { method:'POST', headers:{'Content-Type':'application/json'}, body:'{}' });
    testingData = await res.json();
    renderTesting();
  } catch(e) {
    document.getElementById('loadingState').innerHTML = `<div style="color:var(--red);padding:20px">Error loading testing data: ${e.message}</div>`;
  }
}

async function runSync() {
  const btn = document.getElementById('syncBtn');
  const info = document.getElementById('syncInfo');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin-sm"></span> Syncing…';
  try {
    const res = await fetch(SYNC_API, { method:'POST', headers:{'Content-Type':'application/json'}, body:'{}' });
    const d = await res.json();
    info.textContent = `Last sync: just now — ${d.synced||0} records updated`;
    await testingLoadData();
  } catch(e) {
    info.textContent = `Sync failed: ${e.message}`;
  }
  btn.disabled = false;
  btn.innerHTML = '<span>↻</span> Sync from Sheets';
}

function renderTesting() {
  const loading = document.getElementById('loadingState');
  const content = document.getElementById('content');
  const info = document.getElementById('syncInfo');
  loading.style.display = 'none';
  content.style.display = 'block';

  if (!testingData?.yearGroups?.length) {
    info.textContent = `${testingData?.totalRecords||0} records in database`;
    content.innerHTML = `<div class="empty"><strong>🧪</strong>No testing data yet.<br>Results will appear here as athletes complete the core testing battery.<br><br><span style="font-size:13px;color:var(--muted)">Hit "Sync from Sheets" after recording results in the Google Form.</span></div>`;
    return;
  }

  info.textContent = `${testingData.totalRecords} records — ${testingData.yearGroups.length} year group(s)`;

  if (!testActiveYear || !testingData.yearGroups.find(g=>g.yearLevel===testActiveYear)) {
    testActiveYear = testingData.yearGroups[0].yearLevel;
  }

  const tabsHtml = testingData.yearGroups.map(g => `
    <button class="year-tab ${g.yearLevel===testActiveYear?'active':''}" onclick="setYear('${g.yearLevel}')">
      Year ${g.yearLevel}<span class="count">${g.athleteCount}</span>
    </button>
  `).join('');

  const group = testingData.yearGroups.find(g=>g.yearLevel===testActiveYear);
  content.innerHTML = `<div class="year-tabs">${tabsHtml}</div>${renderYearGroup(group)}`;
}

function setYear(yr) { testActiveYear = yr; renderTesting(); }

function renderYearGroup(group) {
  if (!group) return '';
  const { overallRanking, metricRankings } = group;
  const METRIC_KEYS   = ['hollow_hold','prone_plank','side_plank_left','side_plank_right'];
  const METRIC_LABELS = ['Hollow Hold','Prone Plank','Side Plank L','Side Plank R'];

  const overallRows = overallRanking.map((a, i) => {
    const rankClass = i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'rank-other';
    const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
    const scoreCells = METRIC_KEYS.map(k => {
      const v = a.scores[k];
      if (v===undefined||v===null) return `<td class="score-cell"><span class="no-score">—</span></td>`;
      const cls = v>=60?'score-good':v>=30?'score-mid':'score-low';
      return `<td class="score-cell ${cls}">${v}s</td>`;
    }).join('');
    return `<tr>
      <td><span class="rank-num ${rankClass}">${medal||a.overallRank}</span></td>
      <td><span class="athlete-name">${a.athlete}</span></td>
      <td style="text-align:center"><span class="tests-badge">${a.testsCompleted}/4</span></td>
      <td style="text-align:center;font-weight:700;color:var(--navy)">${a.avgRank}</td>
      ${scoreCells}
    </tr>`;
  }).join('');

  const metricCards = metricRankings.map((m, mi) => {
    if (!m.rankings.length) return '';
    const maxScore = m.rankings[0]?.score || 1;
    const bars = m.rankings.map((r, i) => {
      const pct = Math.round((r.score/maxScore)*100);
      const rankClass = i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'rank-other';
      const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}`;
      const color = i===0?'var(--gold)':i===1?'#94a3b8':i===2?'#b45309':BAR_COLORS[mi%BAR_COLORS.length];
      return `<div class="bar-row">
        <div class="bar-rank ${rankClass}">${medal}</div>
        <div class="bar-name" title="${r.athlete}">${r.athlete}</div>
        <div class="bar-wrap">
          <div class="bar-fill" style="width:${pct}%;background:${color}">${r.score}s</div>
        </div>
      </div>`;
    }).join('');
    return `<div class="card"><div class="card-title">${m.label} <span style="font-weight:400;color:var(--muted)">(${m.rankings.length} athletes)</span></div>${bars}</div>`;
  }).filter(Boolean).join('');

  return `
    <div class="section-title">Overall Rankings — Year ${group.yearLevel}</div>
    <div class="card">
      <div class="card-title">Ranked by average position across all completed tests</div>
      <table class="rank-table">
        <thead><tr>
          <th></th><th>Athlete</th>
          <th class="center">Tests Done</th><th class="center">Avg Rank</th>
          ${METRIC_LABELS.map(l=>`<th class="center">${l}</th>`).join('')}
        </tr></thead>
        <tbody>${overallRows||'<tr><td colspan="8" style="text-align:center;color:var(--muted);padding:30px">No athletes tested yet in this year group</td></tr>'}</tbody>
      </table>
    </div>
    <div class="section-title">Rankings by Test</div>
    <div class="metrics-grid">${metricCards||'<div style="color:var(--muted);padding:20px">No test scores yet</div>'}</div>
  `;
}

  try {
    const d = await fetchData({ view:'coach' });

init();
loadPrefs();
buildSession();
